org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Jetifier was only needed for legacy Android Support Library deps. All of our
# plugins are AndroidX-native, so leaving it on just wastes time and was the
# transform that hit OOM with the AdMob SDK.
android.enableJetifier=false
