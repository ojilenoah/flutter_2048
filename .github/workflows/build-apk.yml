name: Build Android APK

# Build a release APK in the cloud and upload it as a downloadable artifact.
# Runs on every push to main, and can be triggered manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # --split-per-abi: one small APK per CPU architecture instead of one fat
      # APK containing all of them. --obfuscate/--split-debug-info strips the
      # Dart symbols out of the binary, shrinking it further.
      - name: Build release APKs (split per ABI)
        run: flutter build apk --release --split-per-abi --obfuscate --split-debug-info=build/debug-info

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apks
          path: build/app/outputs/flutter-apk/*-release.apk
          if-no-files-found: error
